  #   ADAPTER_ALPHA: "64"
  #   ADAPTER_LOCATION: "qv-attn"
  #   NUM_UNIQUE_LAYERS: "5"
    
  # - RUN_ID: peft_lora_r16_all_5U
  #   ADAPTER_RANK: "16"
  #   ADAPTER_ALPHA: "16"
  #   ADAPTER_LOCATION: "all"
  #   NUM_UNIQUE_LAYERS: "5"
    
  - RUN_ID: peft_lora_r64_qkvo_5U
    ADAPTER_RANK: "64"
    ADAPTER_ALPHA: "64"
    ADAPTER_LOCATION: "qkvo-attn"
    NUM_UNIQUE_LAYERS: "5"

