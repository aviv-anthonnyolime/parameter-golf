# Phase 2 — Per-step PEFT adapters on UT
# Usage: python scripts/run_queue.py experiments/phase2_PEFT/queue.yaml
#
# Base: 10L-5U-512d (Phase 1 best speed/quality trade-off)
# Warmdown ENABLED (Phase 1 runs lacked it — unfair vs baseline)

script: experiments/phase2_PEFT/train_gpt_peft.py
nproc: 4

defaults:
  DATA_PATH: ./data/datasets/fineweb10B_sp1024
  TOKENIZER_PATH: ./data/tokenizers/fineweb_1024_bpe.model
  VOCAB_SIZE: "1024"
  MAX_WALLCLOCK_SECONDS: "1200"   # 20 min screening runs
  TRAIN_LOG_EVERY: "10"
  WANDB_ENABLED: "1"
  WANDB_PROJECT: Openai-challenge-parameter-golf
  GRAD_ACCUM_STEPS: "2"
  # Base UT config
  NUM_LAYERS: "10"
  NUM_UNIQUE_LAYERS: "5"
  MODEL_DIM: "512"
  MLP_MULT: "2"
  NUM_HEADS: "8"
  NUM_KV_HEADS: "4"
  # Warmdown: ~20% of total steps for a 1200s run
  # 10L-5U-512d ≈ 2000 steps @ ~600ms/step (PEFT overhead) → 400 warmdown steps ≈ 240s
  # LR stays at peak until ~960s, then linearly decays to 0.
  # NOTE: do NOT use the base-script default of 1200 here — that would put 58% of
  #       a 1200s run in warmdown (695s), killing useful learning time.
  WARMDOWN_ITERS: "400"
  # PEFT defaults
  PEFT_METHOD: "lora"
  PEFT_RANK: "8"

runs:
  # --- Step 1: LoRA rank sweep ---
  - RUN_ID: peft_lora_r4
    PEFT_RANK: "4"
    PEFT_METHOD: "lora"

  - RUN_ID: peft_lora_r8
    PEFT_RANK: "8"
    PEFT_METHOD: "lora"

  - RUN_ID: peft_lora_r16
    PEFT_RANK: "16"
    PEFT_METHOD: "lora"

  # --- Step 2: Method comparison at rank 8 ---
  # Uncomment once LoRA baseline is established
