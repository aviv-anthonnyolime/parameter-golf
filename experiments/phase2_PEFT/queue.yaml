# Phase 2 — Per-step PEFT adapters on UT
# Usage: python scripts/run_queue.py experiments/phase2_PEFT/queue.yaml
#
# Base: 10L-1U-512d (extreme sharing — adapters differentiate steps)
# Warmdown ENABLED (Phase 1 runs lacked it — unfair vs baseline)

script: experiments/phase2_PEFT/train_gpt_peft.py
nproc: 4

defaults:
  DATA_PATH: ./data/datasets/fineweb10B_sp1024
  TOKENIZER_PATH: ./data/tokenizers/fineweb_1024_bpe.model
  VOCAB_SIZE: "1024"
  MAX_WALLCLOCK_SECONDS: "1200"   # 20 min screening runs
  TRAIN_LOG_EVERY: "10"
  WANDB_ENABLED: "1"
  WANDB_PROJECT: Openai-challenge-parameter-golf
  GRAD_ACCUM_STEPS: "2"
  # Base UT config
  NUM_LAYERS: "10"
  NUM_UNIQUE_LAYERS: "5"
  MODEL_DIM: "512"
  MLP_MULT: "2"
  NUM_HEADS: "8"
  NUM_KV_HEADS: "4"
  TRAIN_SEQ_LEN: "1024"
  # Warmdown: ~20% of total steps for a 1200s run
  WARMDOWN_ITERS: "400"
  # PEFT defaults
  ADAPTER_METHOD: "lora"
  ADAPTER_RANK: "64"
  ADAPTER_ALPHA: "64"
  ADAPTER_LOCATION: "qv-attn"
  SKIP_TTT: "1"          # skip ~10min TTT LoRA eval; set "0" for final/overnight runs

runs:
  # --- Step 1: LoRA rank sweep (qv-attn, cheapest location) ---
