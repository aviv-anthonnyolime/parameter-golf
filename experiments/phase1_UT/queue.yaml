# Queue configuration for phase1_UT experiments
# Usage: python scripts/run_queue.py experiments/phase1_UT/queue.yaml
#        python scripts/run_queue.py experiments/phase1_UT/queue.yaml --dry-run

script: experiments/phase1_UT/train_gpt_ut.py
nproc: 4    # 4 for g5dn.12xlarge (4×A10G), 8 for RunPod (8×H100)

defaults:
  DATA_PATH: ./data/datasets/fineweb10B_sp1024
  TOKENIZER_PATH: ./data/tokenizers/fineweb_1024_bpe.model
  VOCAB_SIZE: "1024"
  MAX_WALLCLOCK_SECONDS: "2000"
  TRAIN_LOG_EVERY: "10"
  WANDB_ENABLED: "1"
  WANDB_PROJECT: Openai-challenge-parameter-golf
  SKIP_TTT: "1"          # skip ~10min TTT LoRA eval; set "0" for final/overnight runs

runs:
  # Baseline: 10L-1U-512d
  - RUN_ID: baseline_10L_512d
    NUM_LAYERS: "10"
    NUM_UNIQUE_LAYERS: "1"
    MODEL_DIM: "512"
    MLP_MULT: "2"

  # Try half 
  - RUN_ID: test_10L_5U_512d
    NUM_LAYERS: "10"
    NUM_UNIQUE_LAYERS: "5"
    MODEL_DIM: "512"
    MLP_MULT: "2"

  # Try 3 with wider
  - RUN_ID: test_9L_2U_512d
    NUM_LAYERS: "9"
    NUM_UNIQUE_LAYERS: "3"
    MODEL_DIM: "640"
    MLP_MULT: "2"

  # Try more unique layers
  - RUN_ID: test_10L_2U_512d
    NUM_LAYERS: "10"
    NUM_UNIQUE_LAYERS: "2"
    MODEL_DIM: "512"
    MLP_MULT: "2"

  # Try wider model
  - RUN_ID: test_10L_1U_640d
    NUM_LAYERS: "10"
    NUM_UNIQUE_LAYERS: "1"
    MODEL_DIM: "640"
    MLP_MULT: "2"

